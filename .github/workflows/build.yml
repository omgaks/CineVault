name: Build CineVault APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject API keys into local.properties
        run: |
          echo "TMDB_TOKEN=${{ secrets.TMDB_TOKEN }}" >> local.properties
          echo "OMDB_API_KEY=${{ secrets.OMDB_API_KEY }}" >> local.properties
          echo "OPENSUB_API_KEY=${{ secrets.OPENSUB_API_KEY }}" >> local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CineVault-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: CineVault-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
