name: Build & Release CineVault APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Inject API keys from secrets
        run: |
          echo "TMDB_TOKEN=${{ secrets.TMDB_TOKEN }}" >> local.properties
          echo "OMDB_API_KEY=${{ secrets.OMDB_API_KEY }}" >> local.properties
          echo "OPENSUB_API_KEY=${{ secrets.OPENSUB_API_KEY }}" >> local.properties

      - name: Decode signing keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > cinevault-release.jks

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -oP '"[^"]*"' | tr -d '"')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -oP '[0-9]+')
          BUILD_DATE=$(date +'%Y-%m-%d')
          echo "name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "date=${BUILD_DATE}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}-b${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Find and rename APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK" app/build/outputs/apk/release/CineVault-${{ steps.version.outputs.name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "CineVault ${{ steps.version.outputs.name }}"
          body: |
            ## CineVault ${{ steps.version.outputs.name }}
            
            **Build:** ${{ steps.version.outputs.code }} | **Date:** ${{ steps.version.outputs.date }}
            
            ### What's New
            - Latest updates from main branch
            
            ---
            *Install: Download the APK below, transfer to your Android device, and install.*
          files: app/build/outputs/apk/release/CineVault-${{ steps.version.outputs.name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
